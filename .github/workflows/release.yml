name: Release Go Binary

on:
  push:
    tags:
      - "v*" # 打 v 开头的 tag 时自动运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o aiclaw-linux-amd64   ./cmd/server
          GOOS=linux  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o aiclaw-linux-arm64   ./cmd/server
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o aiclaw-windows-amd64.exe ./cmd/server
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o aiclaw-darwin-amd64  ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o aiclaw-darwin-arm64  ./cmd/server
          echo "── 压缩前体积 ──"
          ls -lh aiclaw-*

      # UPX 对 darwin Mach-O（尤其 arm64）支持不稳定，且会破坏 Apple 代码签名 /
      # Gatekeeper 校验，因此仅压缩 Linux 和 Windows 二进制。
      - name: Setup UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Compress binaries with UPX
        run: |
          upx --best --lzma aiclaw-linux-amd64
          upx --best --lzma aiclaw-linux-arm64
          upx --best --lzma aiclaw-windows-amd64.exe
          echo "── 压缩后体积 ──"
          ls -lh aiclaw-*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aiclaw-linux-amd64
            aiclaw-linux-arm64
            aiclaw-windows-amd64.exe
            aiclaw-darwin-amd64
            aiclaw-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
