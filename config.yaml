server:
    host: 0.0.0.0
    port: 8080
database:
    driver: sqlite
    dsn: ~/.aiclaw/aiclaw.db
    max_open_conns: 25
    max_idle_conns: 10
log:
    level: info
auth:
    web_token: change-me
upload:
    dir: ~/.aiclaw/uploads
    max_size: 20971520
browser:
    visible: true
    cdp_endpoint: http://127.0.0.1:9222

